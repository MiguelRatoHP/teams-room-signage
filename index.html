<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Signage</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      width: 100%;
      background: black;
      overflow: hidden;
    }
    video, img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: none;
    }
  </style>
</head>
<body>

  <video id="video" autoplay muted loop playsinline>
    <source src="content.mp4" type="video/mp4">
  </video>

  <img id="imagePng" src="content.png" alt="Signage PNG">

  <script>
    const video = document.getElementById("video");
    const png = document.getElementById("imagePng");

    // Try video
    video.oncanplay = () => {
      video.style.display = "block";
    };

    // If video fails to load or is missing, show PNG
    video.onerror = () => {
      png.style.display = "block";
    };

    // Also show PNG if video doesn't exist at all
    png.style.display = "block";

    // Auto refresh every 60s
    setTimeout(() => location.reload(), 60000);
  </script>

</body>
</html>
