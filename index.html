<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Teams Room Display</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    header {
      padding: 20px;
      font-size: 2rem;
      text-align: center;
      background: #1e293b;
    }

    .content {
      flex: 1;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      padding: 20px;
    }

    .card {
      background: #1e293b;
      border-radius: 20px;
      padding: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    }

    .clock {
      font-size: 4rem;
      text-align: center;
    }

    .date {
      text-align: center;
      font-size: 1.5rem;
      opacity: 0.7;
    }

    .announcements {
      font-size: 1.5rem;
      line-height: 1.6;
    }

    footer {
      text-align: center;
      padding: 10px;
      font-size: 1rem;
      opacity: 0.5;
    }
  </style>
</head>
<body>

<header>📺 Teams Room Dashboard</header>

<div class="content">

  <div class="card">
    <div class="clock" id="clock"></div>
    <div class="date" id="date"></div>
  </div>

  <div class="card announcements">
    <h2>📢 Announcements</h2>
    <ul>
      <li>Welcome to the office!</li>
      <li>Team meeting at 3 PM</li>
      <li>Remember to book rooms via Teams</li>
    </ul>
  </div>

</div>

<footer>Auto-refresh every 60 seconds</footer>

<script>
  function updateClock() {
    const now = new Date();

    document.getElementById("clock").innerText =
      now.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});

    document.getElementById("date").innerText =
      now.toLocaleDateString(undefined, {
        weekday: 'long',
        year: 'numeric',
        month: 'long',
        day: 'numeric'
      });
  }

  updateClock();
  setInterval(updateClock, 1000);

  // Auto refresh every 60 seconds
  setTimeout(() => location.reload(), 60000);
</script>

</body>
</html>
