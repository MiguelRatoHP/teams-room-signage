<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Meeting Room Standby</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="refresh" content="300"> <!-- refresh every 5 min -->

  <style>
    body {
      margin: 0;
      font-family: "Segoe UI", Arial, sans-serif;
      background: linear-gradient(135deg, #000000, #1b1b1b);
      color: white;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .container {
      text-align: center;
      max-width: 1200px;
      padding: 40px;
    }

    .logo {
      margin-bottom: 30px;
    }

    .logo img {
      max-width: 320px;
    }

    h1 {
      font-size: 56px;
      margin: 20px 0;
      font-weight: 600;
    }

    .subtitle {
      font-size: 28px;
      opacity: 0.9;
      margin-bottom: 40px;
    }

    .info {
      display: flex;
      justify-content: center;
      gap: 40px;
      margin-top: 40px;
      flex-wrap: wrap;
    }

    .card {
      background: rgba(255,255,255,0.08);
      padding: 25px 35px;
      border-radius: 16px;
      font-size: 22px;
      min-width: 260px;
    }

    .footer {
      margin-top: 60px;
      font-size: 18px;
      opacity: 0.6;
    }
  </style>
</head>

<body>
  <div class="container">

    <!-- Replace with HP / Poly / Customer logo -->
    <div class="logo">
      <img src="https://upload.wikimedia.org/wikipedia/commons/4/45/HP_logo_2012.svg" alt="Logo">
    </div>

    <h1>Welcome</h1>
    <div class="subtitle">This room is ready for your meeting</div>

    <div class="info">
      <div class="card">
        📅 Check the schedule on the touch panel
      </div>
      <div class="card">
        🎥 Powered by HP Poly + Microsoft Teams
      </div>
      <div class="card">
        👆 Tap the controller to start
      </div>
    </div>

    <div class="footer">
      Digital signage shown when the room is idle
    </div>

  </div>
</body>
</html>
