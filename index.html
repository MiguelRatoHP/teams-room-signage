<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Signage</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      width: 100%;
      background: black;
      overflow: hidden;
    }

    video, img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: none;
    }
  </style>
</head>
<body>

  <!-- Video -->
  <video id="video" autoplay muted loop playsinline>
    <source src="content.mp4" type="video/mp4">
  </video>

  <!-- PNG fallback -->
  <img id="imagePng" src="content.png" alt="Signage PNG">

  <script>
    const video = document.getElementById("video");
    const png = document.getElementById("imagePng");

    // Try video first
    video.oncanplay = () => {
      video.style.display = "block";
    };

    video.onerror = () => {
      // Fallback to PNG
      const testPng = new Image();
      testPng.src = "content.png";

      testPng.onload = () => {
        png.style.display = "block";
      };
    };

    // Auto refresh every 60 seconds
    setTimeout(() => location.reload(), 60000);
  </script>

</body>
</html>
