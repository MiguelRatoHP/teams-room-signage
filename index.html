<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Teams Room Signage</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #000;
      color: #fff;
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    header {
      padding: 20px;
      font-size: 2rem;
      text-align: center;
      background: #1e293b;
    }

    .content {
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .card {
      width: 100%;
      height: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
      border-radius: 20px;
      overflow: hidden;
    }

    .card img {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    footer {
      text-align: center;
      padding: 10px;
      font-size: 1rem;
      opacity: 0.5;
      background: #1e293b;
    }
  </style>
</head>
<body>

<header>📺 Teams Room Dashboard</header>

<div class="content">
  <div class="card">
    <img src="ferrari HP TC10 BG.png" alt="Slide Image">
  </div>
</div>

<footer>Auto-refresh every 60 seconds</footer>

<script>
  // Optional: refresh every 60 seconds
  setTimeout(() => location.reload(), 60000);
</script>

</body>
</html>
